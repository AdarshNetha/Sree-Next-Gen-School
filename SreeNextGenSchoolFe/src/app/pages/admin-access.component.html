<section class="admin-access">
  <div class="access-head">
    <div>
      <p class="eyebrow">Admin Access</p>
      <h2>Staff sign in</h2>
    </div>

    <a class="home-btn" routerLink="/">Home Page</a>
  </div>

  @if (errorMessage) {
    <div class="status error">{{ errorMessage }}</div>
  }

  <div class="access-form">
    <label>
      Username
      <input
        class="field-box"
        type="text"
        name="manual_admin_user"
        autocomplete="one-time-code"
        placeholder="Enter username"
        spellcheck="false"
        [(ngModel)]="username"
        (ngModelChange)="updateUsername()"
        (keydown.enter)="handleEnter($event)"
      />
    </label>

    <label>
      Password
      <span class="password-row">
        <input
          class="field-box password-box"
          [class.show-password]="passwordVisible"
          type="text"
          name="manual_admin_key"
          autocomplete="one-time-code"
          placeholder="Enter password"
          spellcheck="false"
          [(ngModel)]="password"
          (ngModelChange)="updatePassword()"
          (keydown.enter)="handleEnter($event)"
        />

        <button
          class="eye-btn"
          type="button"
          [attr.aria-label]="passwordVisible ? 'Hide password' : 'Show password'"
          (click)="togglePassword()"
        >
          @if (passwordVisible) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18" />
              <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
              <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c5 0 8.5 4.2 10 8a13.3 13.3 0 0 1-3 4.4" />
              <path d="M6.5 6.5A13.2 13.2 0 0 0 2 12c1.5 3.8 5 8 10 8a10.8 10.8 0 0 0 4.1-.8" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-8 10-8 10 8 10 8-3.5 8-10 8-10-8-10-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          }
        </button>
      </span>
    </label>

    <button class="primary-btn submit-btn" type="button" [disabled]="!canLogin" (click)="login()">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>
  </div>
</section>
