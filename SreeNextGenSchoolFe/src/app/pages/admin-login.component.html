<section class="page-card auth-card">
  <p class="eyebrow">Admin Login</p>
  <h2>Backend access for school staff.</h2>

  @if (errorMessage) {
    <div class="status error">{{ errorMessage }}</div>
  }

  <form class="request-form" [formGroup]="form" (ngSubmit)="login()">
    <label>
      Username
      <input type="text" formControlName="username" />
    </label>

    <label>
      Password
      <input type="password" formControlName="password" />
    </label>

    <button class="primary-btn submit-btn" type="submit" [disabled]="form.invalid || loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>
  </form>
</section>
