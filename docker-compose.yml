services:
  postgres:
    image: postgres:17
    container_name: sree-nextgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sree-nextgen-network

  backend:
    build:
      context: ./SreeNextGenSchool
    image: sree-nextgen-backend:${BACKEND_IMAGE_TAG}
    container_name: sree-nextgen-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sree-nextgen-network

  frontend:
    build:
      context: ./SreeNextGenSchoolFe
    image: sree-nextgen-frontend:${FRONTEND_IMAGE_TAG}
    container_name: sree-nextgen-frontend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      BACKEND_URL: ${BACKEND_URL}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sree-nextgen-network

networks:
  sree-nextgen-network:
    name: sree-nextgen-network
    driver: bridge

volumes:
  postgres_data:
